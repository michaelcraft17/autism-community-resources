name: Daily Resource Adder

on:
  schedule:
    - cron: '0 9 * * *'   # every day at 9:00 AM UTC
  workflow_dispatch:        # also lets you trigger it manually from the Actions tab

permissions:
  contents: write           # needed so the built-in GITHUB_TOKEN can push commits

jobs:
  add-resources:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run resource adder
        run: python add_resources.py

      - name: Commit and push if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add community_resources.json
          # Only commit if the file actually changed
          git diff --cached --quiet || git commit -m "chore: add 50 new autism resources [$(date -u +%Y-%m-%d)]"
          git push
