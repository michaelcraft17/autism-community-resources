<style>

  --brand:var(--harbor-600);--brand-hover:var(--harbor-700);--brand-active:var(--harbor-800);--brand-subtle:var(--harbor-50);--brand-on:var(--stone-0);--accent:var(--coral-500);--accent-hover:var(--coral-600);--accent-subtle:var(--coral-50);--accent-on:var(--stone-0);
  --bg:var(--stone-50);--bg-sunken:var(--stone-100);--surface:var(--stone-0);--surface-raised:var(--stone-0);--surface-subtle:var(--stone-100);--overlay:rgba(42,38,30,0.46);
  --text:var(--stone-900);--text-secondary:var(--stone-600);--text-muted:var(--stone-500);--text-on-brand:var(--stone-0);--text-link:var(--harbor-600);

  --font-antonio:'Antonio',system-ui,sans-serif;--font-sans:'Hanken Grotesk',system-ui,-apple-system,'Segoe UI',sans-serif;--font-mono:'DM Mono',ui-monospace,Menlo,monospace;
  --dur-fast:140ms;--dur-base:220ms;--ease-out:cubic-bezier(0.22,0.61,0.36,1);
}
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;min-height:100vh;}

body.dark{--bg:#111a1c;--bg-sunken:#192226;--surface:#1e2d31;--surface-subtle:#253238;--text:#edf3f4;--text-secondary:#a8b8bc;--text-muted:#7a9099;--border:#2d4449;--border-strong:#3a5560;--divider:#2d4449;}
a{text-decoration:none;color:inherit;}
button{font-family:inherit;cursor:pointer;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-thumb{background:var(--stone-300);border-radius:3px;}
@media (prefers-reduced-motion:reduce){:root{--dur-fast:0.01ms;--dur-base:0.01ms;}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCjIaR8sa936xf4hZzQ_-ObzpxCRsCWKIM&loading=async"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ─── Data (real coordinates from community_resources.json) ──── */
const RESOURCES = [
  { id:1, name:'UCLA Center for Autism Research and Treatment', type:'medical', address:'Westwood · Los Angeles, CA', phone:'(310) 825-9041', website:'https://www.semel.ucla.edu/autism', distance:2.4, services:['ABA Therapy','Research','Clinical Services','Treatment'], description:'Leading autism research and treatment center providing evidence-based interventions. One of the most comprehensive programs on the West Coast.', coordinates:{lat:34.0689,lng:-118.4452} },
  { id:2, name:'Easterseals — National Network', type:'therapy', address:'National · call for local services', phone:'1-800-757-3257', website:'https://www.easterseals.com', distance:1.2, services:['ABA Therapy','Social Activities','Career Skills','Family Support'], description:'National network providing therapy, social activities, and career skills programs for individuals with autism and disabilities.', coordinates:{lat:41.8781,lng:-87.6298} },
  { id:3, name:'Autistic Self Advocacy Network (ASAN)', type:'advocacy', address:'Washington, D.C. (national)', phone:'(202) 596-1056', website:'https://autisticadvocacy.org', distance:4.1, services:['Self-Advocacy','Policy','Community Programs'], description:'National nonprofit run by and for autistic individuals, centering autistic voices in advocacy and policy.', coordinates:{lat:38.9072,lng:-77.0369} },
  { id:4, name:'Pacific Autism Center for Education', type:'education', address:'Santa Clara, CA 95050', phone:'(408) 245-3400', website:'https://www.pacificautism.org', distance:6.8, services:['Special Education','Non-verbal Programs','Behavior Support'], description:'Non-public school for students with moderate to severe autism, with emphasis on non-verbal learners ages 6–22.', coordinates:{lat:37.3236,lng:-121.9797} },
  { id:5, name:'Autism Society of Los Angeles', type:'advocacy', address:'Torrance · Los Angeles, CA', phone:'(424) 299-1531', website:'https://www.autismla.org', distance:8.3, services:['Advocacy','Warm Line','Healthcare Navigation'], description:'Non-profit serving Los Angeles through advocacy, education, and community collaboration since 1964.', coordinates:{lat:33.8461,lng:-118.3531} },
  { id:6, name:'UCSF Benioff Autism & Neurodevelopmental Center', type:'medical', address:'Mission Bay · San Francisco, CA', phone:'(877) 822-4453', website:'https://www.ucsfbenioffchildrens.org', distance:12.6, services:['Diagnosis','Developmental Assessment','ADHD Treatment'], description:'Highly specialized care for patients with autism spectrum disorder and neurodevelopmental disorders at UCSF.', coordinates:{lat:37.7699,lng:-122.3925} },
];

const TYPE_META = {
  advocacy:        { label:'Advocacy',       bg:'var(--type-advocacy-bg)',  fg:'var(--type-advocacy-fg)',  thumb:'#c9e4e6' },
  therapy:         { label:'Therapy',        bg:'var(--type-therapy-bg)',   fg:'var(--type-therapy-fg)',   thumb:'#dfd8ee' },
  education:       { label:'Education',      bg:'var(--type-education-bg)', fg:'var(--type-education-fg)', thumb:'#cde3cf' },
  medical:         { label:'Medical',        bg:'var(--type-medical-bg)',   fg:'var(--type-medical-fg)',   thumb:'#f0cbc6' },
  social:          { label:'Social',         bg:'var(--type-social-bg)',    fg:'var(--type-social-fg)',    thumb:'#f5d5c8' },
  general_support: { label:'General Support',bg:'var(--type-general-bg)',   fg:'var(--type-general-fg)',   thumb:'#ddd8cf' },
};

/* ─── Full dataset (community_data.js) + geo helpers ────────── */
const ALL = (Array.isArray(window.communityData) && window.communityData.length
  ? window.communityData
  : RESOURCES
).map((r,i) => ({
  id: i+1, name: r.name, type: r.type, address: r.address, phone: r.phone,
  website: r.website, services: r.services || [], description: r.description || '',
  coordinates: r.coordinates,
})).filter(r => r.coordinates && r.coordinates.lat && r.coordinates.lng);

function haversine(a, b){
  if (!a || !b) return null;
  const R = 3959; // miles
  const dLat = (b.lat-a.lat)*Math.PI/180, dLng = (b.lng-a.lng)*Math.PI/180;
  const s = Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
}

async function geocode(q){
  const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=us&q=' + encodeURIComponent(q);
  const res = await fetch(url, { headers:{ 'Accept':'application/json' } });
  const data = await res.json();
  if (data && data.length) return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
  return null;
}

const DIST_OPTIONS = [["Any distance",null],["Driving (25 mi.)",25],["Nearby (10 mi.)",10],["Close (5 mi.)",5],["Walking (2 mi.)",2]];
const MAX_SHOWN = 60;

/* ─── Icons ─────────────────────────────────────────────────── */
const PinIcon = ({s=15}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M12 22s7-6.2 7-12a7 7 0 10-14 0c0 5.8 7 12 7 12z" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"/><circle cx="12" cy="10" r="2.5" stroke="currentColor" strokeWidth="2"/></svg>;
const SearchIcon = ({s=18}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" strokeWidth="2"/><path d="M20 20l-3.5-3.5" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>;
const MoonIcon = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"/></svg>;
const SunIcon = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="5" stroke="currentColor" strokeWidth="2"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>;
const HeartIcon = ({f}) => <svg width="18" height="18" viewBox="0 0 24 24" fill={f?'var(--coral-500)':'none'}><path d="M12 20s-7-4.6-7-9.5A4.5 4.5 0 0112 7a4.5 4.5 0 017 3.5C19 15.4 12 20 12 20z" stroke={f?'var(--coral-500)':'var(--stone-400)'} strokeWidth="2" strokeLinejoin="round"/></svg>;
const ShareIcon = () => <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="18" cy="5" r="3" stroke="currentColor" strokeWidth="2"/><circle cx="6" cy="12" r="3" stroke="currentColor" strokeWidth="2"/><circle cx="18" cy="19" r="3" stroke="currentColor" strokeWidth="2"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51L8.59 10.49" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>;

/* ─── Logo ──────────────────────────────────────────────────── */
const Logo = ({onClick}) => (
  <button onClick={onClick} style={{background:'transparent',border:'none',padding:0,display:'flex',alignItems:'center',gap:10,cursor:'pointer'}}>
    <svg width="32" height="32" viewBox="0 0 60 60" fill="none">
      <rect x="2" y="2" width="56" height="56" rx="14" fill="var(--harbor-600)"/>
      <path d="M30 16c-7.2 0-13 5.6-13 12.6 0 8.8 13 18.4 13 18.4s13-9.6 13-18.4C43 21.6 37.2 16 30 16z" fill="#fff"/>
      <circle cx="30" cy="28.4" r="5.4" fill="var(--coral-500)"/>
    </svg>
    <div style={{display:'flex',flexDirection:'column',lineHeight:1.1}}>
      <span style={{fontFamily:'var(--font-antonio)',fontWeight:700,fontSize:17,letterSpacing:'0.01em',color:'var(--text)'}}>ACCESSIBILITY</span>
      <span style={{fontFamily:'var(--font-antonio)',fontWeight:500,fontSize:13,letterSpacing:'0.08em',color:'var(--brand)'}}>MAPPER</span>
    </div>
  </button>
);

/* ─── TypePill ──────────────────────────────────────────────── */
const TypePill = ({type,small}) => {
  const t = TYPE_META[type] || TYPE_META.general_support;
  return (
    <span style={{display:'inline-flex',alignItems:'center',gap:5,background:t.bg,color:t.fg,borderRadius:999,padding:small?'3px 9px':'4px 11px',fontSize:small?10:11,fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase',whiteSpace:'nowrap'}}>
      <span style={{width:5,height:5,borderRadius:'50%',background:t.fg}}/>{t.label}
    </span>
  );
};

/* ─── Resource card — Yelp horizontal style ─────────────────── */
const ResourceCard = ({r, idx, fav, onFav, active, onHover}) => {
  const t = TYPE_META[r.type] || TYPE_META.general_support;
  return (
    <div
      onMouseEnter={()=>onHover(r.id)} onMouseLeave={()=>onHover(null)}
      style={{display:'flex',gap:0,background:'var(--surface)',border:`1px solid ${active?'var(--border-focus)':'var(--border)'}`,borderRadius:14,overflow:'hidden',boxShadow:active?'0 4px 16px rgba(23,93,105,.14)':'0 1px 3px rgba(42,38,30,.07)',transition:'box-shadow var(--dur-base) var(--ease-out),border-color var(--dur-fast)',marginBottom:12}}>
      <div style={{position:'relative',width:140,flexShrink:0}}>
        <div style={{width:'100%',height:'100%',minHeight:130,background:t.thumb,display:'flex',alignItems:'center',justifyContent:'center',position:'relative'}}>
          <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',opacity:.13}} viewBox="0 0 140 130" preserveAspectRatio="none">
            {[0,20,40,60,80,100,120,140].map(x=><line key={x} x1={x} y1="0" x2={x} y2="130" stroke={t.fg} strokeWidth="1"/>)}
            {[0,20,40,60,80,100,130].map(y=><line key={y} x1="0" y1={y} x2="140" y2={y} stroke={t.fg} strokeWidth="1"/>)}
          </svg>
          <svg width="36" height="44" viewBox="0 0 24 32" fill="none" style={{opacity:.5}}>
            <path d="M12 2C7.6 2 4 5.6 4 10c0 6.4 8 20 8 20s8-13.6 8-20C20 5.6 16.4 2 12 2z" fill={t.fg}/>
            <circle cx="12" cy="10" r="3.2" fill="#fff"/>
          </svg>
        </div>
        <div style={{position:'absolute',top:10,left:10,width:28,height:28,borderRadius:'50%',background:'var(--coral-500)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--font-antonio)',fontWeight:700,fontSize:15,boxShadow:'0 2px 6px rgba(200,106,82,.4)'}}>
          {idx+1}
        </div>
      </div>
      <div style={{flex:1,padding:'14px 16px 14px 18px',display:'flex',flexDirection:'column',gap:6,minWidth:0}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:8}}>
          <div style={{minWidth:0}}>
            <h3 style={{margin:'0 0 5px',fontFamily:'var(--font-antonio)',fontWeight:700,fontSize:19,letterSpacing:'-0.01em',lineHeight:1.15,color:'var(--text)',textWrap:'balance'}}>{r.name}</h3>
            <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
              <TypePill type={r.type} small/>
              <span style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:12,color:'var(--text-muted)'}}>
                <PinIcon s={12}/>{r.address}
              </span>
              {r.distance != null && <span style={{fontSize:12,fontWeight:600,color:'var(--success-fg)'}}>{r.distance.toFixed(1)} mi away</span>}
            </div>
          </div>
          <div style={{display:'flex',gap:2,flexShrink:0}}>
            <button onClick={()=>onFav(r.id)} aria-label="Save" style={{width:34,height:34,borderRadius:'50%',border:'1px solid var(--border)',background:'var(--surface)',color:'var(--text-muted)',display:'inline-flex',alignItems:'center',justifyContent:'center'}}>
              <HeartIcon f={fav}/>

            <button aria-label="Share" style={{width:34,height:34,borderRadius:'50%',border:'1px solid var(--border)',background:'var(--surface)',color:'var(--text-muted)',display:'inline-flex',alignItems:'center',justifyContent:'center'}}>

        </div>

/* ─── Map styling — calm, low-saturation to match palette ───── */
const MAP_STYLE = [
  { elementType:'geometry', stylers:[{color:'#f4f0e9'}] },
  { elementType:'labels.text.fill', stylers:[{color:'#7a6e5c'}] },
  { elementType:'labels.text.stroke', stylers:[{color:'#faf7f2'}] },
  { featureType:'water', elementType:'geometry', stylers:[{color:'#c9e4e6'}] },
  { featureType:'landscape.natural', elementType:'geometry', stylers:[{color:'#e6f0e2'}] },
  { featureType:'poi.park', elementType:'geometry', stylers:[{color:'#d9ead0'}] },
  { featureType:'road', elementType:'geometry', stylers:[{color:'#ffffff'}] },
  { featureType:'road.arterial', elementType:'geometry', stylers:[{color:'#f0ebe2'}] },
  { featureType:'road.highway', elementType:'geometry', stylers:[{color:'#eae3d8'}] },
  { featureType:'poi', elementType:'labels.icon', stylers:[{saturation:-60}] },
  { featureType:'transit', stylers:[{visibility:'simplified'}] },
];

const HARBOR = '#175d69', CORAL = '#e0846b';
const pinSymbol = (act) => ({
  path: 0, // google.maps.SymbolPath.CIRCLE
  fillColor: act ? CORAL : HARBOR,
  fillOpacity: 1,
  strokeColor: '#ffffff',
  strokeWeight: 2,
  scale: act ? 15 : 12,
});

/* ─── Map panel — real Google Map with numbered pins ────────── */
const MapPanel = ({resources, active, filtered, onHover}) => {
  const show = filtered.length > 0 ? filtered : resources;
  const elRef = useRef(null);
  const mapRef = useRef(null);
  const infoRef = useRef(null);
  const markersRef = useRef({});
  const [ready, setReady] = useState(0);
  const showKey = show.map(r=>r.id).join(',');

  // init map (wait for Google Maps script to be ready)
  useEffect(() => {
    let cancelled = false;
    (function init(){
      if (cancelled || mapRef.current) return;
      if (!window.google || !window.google.maps) { setTimeout(init, 120); return; }
      mapRef.current = new google.maps.Map(elRef.current, {
        center: { lat: 37.8, lng: -110 }, zoom: 4,
        mapTypeControl: false, streetViewControl: false, fullscreenControl: false,
        zoomControl: true, styles: MAP_STYLE, backgroundColor: '#c9e4e6',
        gestureHandling: 'greedy',
      });
      infoRef.current = new google.maps.InfoWindow();
      setReady(r => r + 1);
    })();
    return () => { cancelled = true; };
  }, []);

  // draw / refresh markers when the shown set changes
  useEffect(() => {
    const map = mapRef.current;
    if (!map || !window.google) return;
    Object.values(markersRef.current).forEach(m => m.setMap(null));
    markersRef.current = {};
    const bounds = new google.maps.LatLngBounds();
    let count = 0;
    show.forEach(r => {
      if (!r.coordinates) return;
      const num = resources.findIndex(x => x.id === r.id) + 1;
      const marker = new google.maps.Marker({
        position: r.coordinates, map,
        icon: pinSymbol(active === r.id),
        label: { text: String(num), color: '#ffffff', fontSize: '12px', fontWeight: '700', fontFamily: 'Hanken Grotesk, sans-serif' },
        title: r.name, zIndex: active === r.id ? 999 : 1,
      });
      marker.addListener('click', () => {
        infoRef.current.setContent(
          '<div style="font-family:Hanken Grotesk,sans-serif;max-width:210px;line-height:1.4">' +
          '<strong style="font-size:14px;color:#175d69">' + r.name + '</strong>' +
          '<div style="font-size:12px;color:#5c5345;margin:4px 0">' + r.address + '</div>' +
          '<a href="tel:' + r.phone + '" style="font-size:12px;color:#175d69;font-weight:600">' + r.phone + '</a></div>'
        );
        infoRef.current.open(map, marker);
      });
      marker.addListener('mouseover', () => onHover(r.id));
      marker.addListener('mouseout', () => onHover(null));
      markersRef.current[r.id] = marker;
      bounds.extend(r.coordinates);
      count++;
    });
    if (count === 1) { map.setCenter(bounds.getCenter()); map.setZoom(11); }
    else if (count > 1) map.fitBounds(bounds, 56);
  }, [showKey, ready]);

  // highlight active marker without redrawing
  useEffect(() => {
    Object.entries(markersRef.current).forEach(([id, m]) => {
      const isA = String(active) === id;
      m.setIcon(pinSymbol(isA));
      m.setZIndex(isA ? 999 : 1);
    });
  }, [active]);

  return (
    <div style={{position:'relative',borderRadius:14,overflow:'hidden',height:'100%',minHeight:480,boxShadow:'0 1px 3px rgba(42,38,30,.1)',border:'1px solid var(--border)'}}>
      <div ref={elRef} style={{width:'100%',height:'100%',minHeight:480,background:'#c9e4e6'}}/>
    </div>
  );
};

/* ─── Sidebar filters ────────────────────────────────────────── */
const Sidebar = ({typeFilter, setTypeFilter, radius, setRadius}) => {
  const suggested = ['Open Now','Accepts Insurance','Wheelchair Accessible','Free Services','Telehealth Available','In-home Services'];
  const [selSug, setSelSug] = useState([]);
  const toggleSug = s => setSelSug(a => a.includes(s) ? a.filter(x=>x!==s) : [...a,s]);
  const sectionStyle = {borderBottom:'1px solid var(--divider)',paddingBottom:18,marginBottom:18};
  const labelStyle = {fontSize:14,fontWeight:700,color:'var(--text)',margin:'0 0 10px',display:'block'};
  const radioStyle = {display:'flex',alignItems:'center',gap:8,fontSize:13,color:'var(--text-secondary)',padding:'3px 0',cursor:'pointer'};
  return (
    <aside style={{width:220,flexShrink:0,paddingRight:20}}>
      <div style={sectionStyle}>
        <span style={labelStyle}>Distance</span>
        {DIST_OPTIONS.map(([d,mi])=>(
          <label key={d} style={radioStyle}>
            <input type="radio" name="dist" checked={radius===mi} onChange={()=>setRadius(mi)} style={{accentColor:'var(--brand)'}}/>
            {d}
          </label>
        ))}
      </div>
      <div style={sectionStyle}>
        <span style={labelStyle}>Category</span>
        {['All types','Advocacy','Therapy','Education','Medical','Social'].map(t=>(
          <button key={t} onClick={()=>setTypeFilter(t==='All types'?'':t.toLowerCase())}
            style={{display:'block',width:'100%',textAlign:'left',padding:'5px 10px',marginBottom:4,borderRadius:20,border:`1px solid ${typeFilter===(t==='All types'?'':t.toLowerCase())?'var(--brand)':'var(--border)'}`,background:typeFilter===(t==='All types'?'':t.toLowerCase())?'var(--brand-subtle)':'transparent',fontSize:13,color:typeFilter===(t==='All types'?'':t.toLowerCase())?'var(--brand)':'var(--text-secondary)',fontWeight:typeFilter===(t==='All types'?'':t.toLowerCase())?600:400,cursor:'pointer'}}>
            {t}
          </button>
        ))}
      </div>
      <div>
        <span style={labelStyle}>Suggested</span>
        {suggested.map(s=>(
          <label key={s} style={radioStyle}>
            <input type="checkbox" checked={selSug.includes(s)} onChange={()=>toggleSug(s)} style={{accentColor:'var(--brand)'}}/>
            {s}
          </label>
        ))}
      </div>
    </aside>
  );
};

/* ─── Header ─────────────────────────────────────────────────── */
const Header = ({dark, setDark, locLabel, keyword, setKeyword, onLogoClick, onChangeLocation}) => {
  return (
    <header style={{background:'var(--surface)',borderBottom:'1px solid var(--border)',position:'sticky',top:0,zIndex:200,boxShadow:'0 1px 4px rgba(42,38,30,.06)'}}>
      <div style={{maxWidth:1280,margin:'0 auto',padding:'0 24px',height:62,display:'flex',alignItems:'center',gap:16}}>
        <Logo onClick={onLogoClick}/>
        <form onSubmit={e=>e.preventDefault()} style={{flex:1,display:'flex',alignItems:'center',gap:0,border:'2px solid var(--border-focus)',borderRadius:10,overflow:'hidden',height:42,maxWidth:700}}>
          <div style={{flex:1,display:'flex',alignItems:'center',gap:8,padding:'0 14px',background:'var(--surface)'}}>
            <span style={{color:'var(--text-muted)',display:'inline-flex'}}><SearchIcon/></span>
            <input value={keyword} onChange={e=>setKeyword(e.target.value)} placeholder="Filter by name, service, or type…" style={{flex:1,border:'none',outline:'none',background:'transparent',fontSize:14,color:'var(--text)',fontFamily:'var(--font-sans)'}}/>
          </div>
          <div style={{width:1,height:28,background:'var(--border)'}}/>
          <button type="button" onClick={onChangeLocation} title="Change location" style={{display:'flex',alignItems:'center',gap:6,padding:'0 12px',background:'var(--surface)',border:'none',height:'100%',cursor:'pointer',fontSize:13,color:'var(--text-secondary)'}}>
            <PinIcon s={14}/><span style={{whiteSpace:'nowrap'}}>{locLabel || 'Near you'}</span>
          </button>
          <div style={{height:'100%',width:44,background:'var(--brand)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff'}}>
            <SearchIcon s={16}/>
          </div>
        </form>
        <button onClick={()=>setDark(d=>!d)} style={{marginLeft:'auto',display:'inline-flex',alignItems:'center',gap:6,height:36,padding:'0 14px',background:'var(--surface-subtle)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text-secondary)',fontSize:13}}>
          {dark?<SunIcon/>:<MoonIcon/>} {dark?'Light':'Dark'}
        </button>
      </div>
    </header>
  );
};

/* ─── Landing ────────────────────────────────────────────────── */
const Landing = ({onSearch, onLocate, busy, error}) => {
  const [q, setQ] = useState('');
  return (
    <div>
      <section style={{background:'var(--harbor-700)',padding:'72px 24px 64px',textAlign:'center'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:14,marginBottom:24}}>
          <svg width="52" height="52" viewBox="0 0 60 60" fill="none"><rect x="2" y="2" width="56" height="56" rx="16" fill="rgba(255,255,255,.15)"/><path d="M30 16c-7.2 0-13 5.6-13 12.6 0 8.8 13 18.4 13 18.4s13-9.6 13-18.4C43 21.6 37.2 16 30 16z" fill="#fff"/><circle cx="30" cy="28.4" r="5.4" fill="var(--coral-400)"/></svg>
          <h1 style={{fontFamily:'var(--font-antonio)',fontWeight:700,fontSize:'clamp(36px,5vw,58px)',letterSpacing:'0.02em',color:'#fff',margin:0,lineHeight:1}}>ACCESSIBILITY MAPPER</h1>
        </div>
        <p style={{fontSize:18,color:'rgba(255,255,255,.8)',margin:'0 auto 36px',maxWidth:'50ch',lineHeight:1.6}}>Find autism &amp; special needs resources near you — therapy, advocacy, education, medical, and more.</p>
        <form onSubmit={e=>{e.preventDefault();if(q.trim())onSearch(q);}} style={{display:'flex',gap:0,maxWidth:620,margin:'0 auto',borderRadius:12,overflow:'hidden',boxShadow:'0 8px 30px rgba(0,0,0,.2)'}}>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Enter city, zip code, or address…" style={{flex:1,height:54,padding:'0 20px',border:'none',outline:'none',fontSize:16,background:'#fff',color:'#2a261e',fontFamily:'var(--font-sans)'}}/>
          <button type="submit" disabled={busy} style={{height:54,padding:'0 28px',background:'var(--coral-500)',color:'#fff',border:'none',fontSize:16,fontWeight:700,fontFamily:'var(--font-antonio)',letterSpacing:'.05em',cursor:busy?'wait':'pointer',whiteSpace:'nowrap',opacity:busy?.7:1}}>{busy?'…':'SEARCH'}</button>
        </form>
        <button onClick={onLocate} disabled={busy} style={{marginTop:14,background:'transparent',border:'none',color:'rgba(255,255,255,.75)',fontSize:14,cursor:busy?'wait':'pointer',display:'inline-flex',alignItems:'center',gap:6}}>
          <PinIcon s={14}/> Use my current location
        </button>
        {error && <div style={{marginTop:14,color:'#ffd9cf',fontSize:14}}>{error}</div>}
      </section>
      <section style={{maxWidth:900,margin:'56px auto',padding:'0 24px'}}>
        <div style={{textAlign:'center',marginBottom:36}}>
          <span style={{display:'inline-block',background:'var(--brand-subtle)',color:'var(--brand)',borderRadius:999,padding:'5px 16px',fontSize:12,fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',marginBottom:14}}>Cal Poly Pomona · CS Department</span>
          <h2 style={{fontFamily:'var(--font-antonio)',fontWeight:700,fontSize:32,letterSpacing:'.01em',color:'var(--text)',margin:0}}>AI-POWERED RESEARCH PROJECT</h2>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:18}}>
          {[['Spectrum Support Criteria','Researching what constitutes effective autism accommodations in public settings.'],['Generative AI Analysis','Applying LLMs to infer spectrum-friendliness from reviews and web content.'],['Community Tool','Building an accessible, user-friendly directory for families and caregivers.']].map(([h,b],i)=>(
            <div key={i} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:14,padding:'22px 20px',boxShadow:'0 1px 3px rgba(42,38,30,.06)'}}>
              <div style={{width:36,height:4,background:'var(--coral-500)',borderRadius:999,marginBottom:14}}/>
              <h3 style={{margin:'0 0 8px',fontFamily:'var(--font-antonio)',fontWeight:700,fontSize:17,letterSpacing:'.01em',color:'var(--text)'}}>{h}</h3>
              <p style={{margin:0,fontSize:13,color:'var(--text-muted)',lineHeight:1.55}}>{b}</p>
            </div>
          ))}
        </div>
      </section>
    </div>
  );
};

/* ─── Results ────────────────────────────────────────────────── */
const Results = ({coords, locLabel, keyword, favs, onFav}) => {
  const [typeFilter, setTypeFilter] = useState('');
  const [radius, setRadius] = useState(null);
  const [activeId, setActiveId] = useState(null);

  const kw = keyword.trim().toLowerCase();
  let list = ALL.map(r => ({...r, distance: coords ? haversine(coords, r.coordinates) : null}));
  if (coords) list.sort((a,b)=>(a.distance ?? 1e9)-(b.distance ?? 1e9));
  const filtered = list.filter(r =>
    (!kw
      || r.name.toLowerCase().includes(kw)
      || (r.services||[]).join(' ').toLowerCase().includes(kw)
      || (r.description||'').toLowerCase().includes(kw)
      || (TYPE_META[r.type] ? TYPE_META[r.type].label.toLowerCase().includes(kw) : false)) &&
    (!typeFilter || r.type === typeFilter) &&
    (radius == null || (r.distance != null && r.distance <= radius))
  );
  const shown = filtered.slice(0, MAX_SHOWN);

  return (
    <div style={{maxWidth:1280,margin:'0 auto',padding:'24px 24px 64px'}}>
      <div style={{fontSize:13,color:'var(--text-muted)',marginBottom:14,display:'flex',alignItems:'center',gap:6}}>
        <span style={{cursor:'pointer',color:'var(--text-link)'}}>Community Resources</span>
        <span>›</span>
        <span style={{cursor:'pointer',color:'var(--text-link)'}}>Autism &amp; Special Needs</span>
        <span>›</span>
        <span style={{color:'var(--text-muted)'}}>{locLabel}</span>
      </div>
      <div style={{marginBottom:20}}>
        <h2 style={{fontFamily:'var(--font-antonio)',fontWeight:700,fontSize:'clamp(20px,3vw,28px)',margin:'0 0 4px',letterSpacing:'.01em',color:'var(--text)'}}>
          {filtered.length} Resource{filtered.length!==1?'s':''}{radius!=null?` within ${radius} mi`:''} Near {locLabel}
        </h2>
        <div style={{fontSize:13,color:'var(--text-muted)'}}>
          {coords ? 'Sorted by distance' : 'Browse all'}
          {filtered.length > shown.length ? ` · showing nearest ${shown.length}` : ''}
          {` · ${ALL.length} total in directory`}
        </div>
      </div>
      <div style={{display:'flex',gap:0,alignItems:'flex-start'}}>
        <Sidebar typeFilter={typeFilter} setTypeFilter={setTypeFilter} radius={radius} setRadius={setRadius}/>
        <div style={{flex:1,minWidth:0}}>
          {shown.length === 0 ? (
            <div style={{textAlign:'center',padding:'64px 0',color:'var(--text-muted)'}}>
              <div style={{fontSize:32,marginBottom:10}}>🔍</div>
              <div style={{fontFamily:'var(--font-antonio)',fontSize:20,fontWeight:700}}>NO RESULTS FOUND</div>
              <div style={{fontSize:14,marginTop:6}}>Try widening the distance or clearing filters</div>
            </div>
          ) : shown.map((r,i)=>(
            <ResourceCard key={r.id} r={r} idx={i} fav={favs.includes(r.id)} onFav={onFav} active={activeId===r.id} onHover={setActiveId}/>
          ))}
        </div>
        <div style={{width:380,flexShrink:0,marginLeft:20,position:'sticky',top:80,height:'calc(100vh - 100px)'}}>
          <MapPanel resources={shown} filtered={shown} active={activeId} onHover={setActiveId}/>
        </div>
      </div>
    </div>
  );
};

/* ─── App ────────────────────────────────────────────────────── */
function App() {
  const [dark, setDark] = useState(false);
  const [screen, setScreen] = useState('landing');
  const [coords, setCoords] = useState(null);
  const [locLabel, setLocLabel] = useState('');
  const [keyword, setKeyword] = useState('');
  const [favs, setFavs] = useState([]);
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState('');
  useEffect(() => { document.body.classList.toggle('dark', dark); }, [dark]);

  const goLanding = () => { setScreen('landing'); setError(''); };

  const searchLocation = async (text) => {
    setBusy(true); setError('');
    try {
      const c = await geocode(text);
      if (!c) { setError('Couldn’t find that location. Try a city, ZIP code, or full address.'); setBusy(false); return; }
      setCoords(c); setLocLabel(text); setKeyword(''); setScreen('results');
    } catch (e) { setError('Search failed — please try again.'); }
    setBusy(false);
  };

  const useMyLocation = () => {
    if (!navigator.geolocation) { setError('Geolocation isn’t supported by your browser.'); return; }
    setBusy(true); setError('');
    navigator.geolocation.getCurrentPosition(
      pos => { setCoords({lat:pos.coords.latitude, lng:pos.coords.longitude}); setLocLabel('My Location'); setKeyword(''); setScreen('results'); setBusy(false); },
      err => { setError(err.code===1 ? 'Location permission denied — enter a location instead.' : 'Couldn’t get your location.'); setBusy(false); },
      { enableHighAccuracy:true, timeout:10000 }
    );
  };

  const toggleFav = id => setFavs(f => f.includes(id) ? f.filter(x=>x!==id) : [...f,id]);
  return (
    <div>
      <Header dark={dark} setDark={setDark} locLabel={locLabel} keyword={keyword} setKeyword={setKeyword} onLogoClick={goLanding} onChangeLocation={goLanding}/>
      <main>{screen==='landing' ? <Landing onSearch={searchLocation} onLocate={useMyLocation} busy={busy} error={error}/> : <Results coords={coords} locLabel={locLabel} keyword={keyword} favs={favs} onFav={toggleFav}/>}</main>
      <footer style={{borderTop:'1px solid var(--border)',background:'var(--surface)',padding:'18px 24px',textAlign:'center',fontSize:12,color:'var(--text-muted)'}}>
        © 2025 Accessibility Mapper · Cal Poly Pomona Computer Science ·{' '}
        <a href="https://github.com/michaelcraft17/autism-community-resources" target="_blank" rel="noopener noreferrer" style={{color:'var(--text-link)',fontWeight:600}}>GitHub</a>
        <span style={{display:'block',marginTop:3}}>Always verify information directly with service providers.</span>
      </footer>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
